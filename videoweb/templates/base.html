<!DOCTYPE html>
<html>
<head>
    <title>Video App</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        /* ================= BASE ================= */
        body {
            margin: 0;
            background: #f5f5f5;
            color: #111;
            font-family: Arial, sans-serif;
            transition: 0.3s;
        }

        /* ================= DARK MODE ================= */
        body.dark {
            background: #0f0f0f;
            color: #fff;
        }

        body.dark .card,
        body.dark .sidebar {
            background: #1c1c1c !important;
            color: white;
        }

        body.dark .video-item {
            background: #222;
        }

        body.dark .video-item:hover {
            background: #333;
        }

        /* ================= TOPBAR ================= */
        .topbar {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: #111;
            color: white;
            padding: 10px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #333;
        }

        /* ================= SIDEBAR ================= */
        .sidebar {
            width: 280px;
            height: 100vh;
            background: #fff;
            position: fixed;
            overflow-y: auto;
            border-right: 1px solid #ddd;
        }

        .main {
            margin-left: 280px;
            padding: 20px;
        }

        /* ================= VIDEO ITEM ================= */
        .video-item {
            background: #eee;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.2s;
        }

        .video-item:hover {
            background: #ddd;
        }

        /* ================= RESPONSIVE ================= */
        @media (max-width: 768px) {
            .sidebar {
                width: 100%;
                height: auto;
                position: relative;
            }

            .main {
                margin-left: 0;
            }
        }
    </style>
</head>

<body>

<!-- ================= TOPBAR ================= -->
<div class="topbar">

    <div>🎬 Video App</div>

    <div class="d-flex gap-2 align-items-center">

        <!-- ADMIN -->
        {% if session.get('role') == 'admin' %}
        <a href="/admin" class="btn btn-sm btn-warning">Admin</a>
        {% endif %}

        <!-- DARK MODE -->
        <button onclick="toggleTheme()" class="btn btn-sm btn-outline-light">
            🌙
        </button>

        <!-- LOGOUT -->
        {% if session.get('user') %}
        <a href="/logout" class="btn btn-sm btn-danger">
            Logout
        </a>
        {% endif %}

    </div>

</div>

<!-- ================= CONTENT ================= -->
{% block content %}{% endblock %}

</body>

<script>
/* ================= DARK MODE FIX ================= */
function setTheme(mode) {
    if (mode === "dark") {
        document.body.classList.add("dark");
    } else {
        document.body.classList.remove("dark");
    }
    localStorage.setItem("theme", mode);
}

function toggleTheme() {
    let current = localStorage.getItem("theme");

    if (current === "dark") {
        setTheme("light");
    } else {
        setTheme("dark");
    }
}

/* LOAD THEME */
window.onload = function () {
    let theme = localStorage.getItem("theme");
    if (theme === "dark") {
        document.body.classList.add("dark");
    }
}
</script>

</html>
